<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lundi des Champions ⚽</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00E676;
    --green-dark: #00C853;
    --black: #0A0A0A;
    --card: #1A1A1A;
    --border: #2A2A2A;
    --text: #F0F0F0;
    --muted: #888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: radial-gradient(circle at 20% 20%, rgba(0,230,118,0.06) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(0,230,118,0.04) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  .container { max-width: 700px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
  header { padding: 60px 0 40px; text-align: center; border-bottom: 1px solid var(--border); margin-bottom: 50px; }
  .header-badge { display: inline-block; background: rgba(0,230,118,0.12); border: 1px solid rgba(0,230,118,0.3); color: var(--green); font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 6px 16px; border-radius: 20px; margin-bottom: 24px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(64px, 12vw, 100px); line-height: 0.9; letter-spacing: 2px; }
  h1 span { color: var(--green); display: block; }
  .header-sub { margin-top: 18px; color: var(--muted); font-size: 15px; font-weight: 300; }
  #loading { text-align: center; padding: 60px 0; color: var(--muted); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #matches-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 60px; }
  .match-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: transform 0.2s, border-color 0.2s; animation: slideIn 0.4s ease both; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .match-card:hover { transform: translateY(-2px); border-color: rgba(0,230,118,0.3); }
  .match-inner { display: flex; align-items: center; }
  .match-date-block { background: rgba(0,230,118,0.08); border-right: 1px solid var(--border); padding: 24px 20px; min-width: 90px; text-align: center; flex-shrink: 0; }
  .match-day { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--green); line-height: 1; }
  .match-month { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
  .match-info { padding: 20px 24px; flex: 1; }
  .match-weekday { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .match-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .match-details { display: flex; gap: 16px; flex-wrap: wrap; }
  .match-detail { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); }
  .players-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.25); color: var(--green); font-size: 13px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .players-badge.full { background: rgba(229,57,53,0.1); border-color: rgba(229,57,53,0.3); color: #e53935; }
  .players-badge.loading { opacity: 0.5; }
  .match-cta { padding: 20px 20px 20px 0; flex-shrink: 0; }
  .btn-join { display: inline-flex; align-items: center; gap: 8px; background: var(--green); color: var(--black); font-weight: 700; font-size: 13px; padding: 12px 20px; border-radius: 10px; text-decoration: none; transition: background 0.2s, transform 0.1s; white-space: nowrap; }
  .btn-join:hover { background: var(--green-dark); transform: scale(1.03); }
  .match-card.past { opacity: 0.45; }
  .past-badge { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); background: rgba(255,255,255,0.05); padding: 3px 8px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; display: block; opacity: 0.5; }
  #admin-toggle-area { text-align: center; padding: 30px 0 10px; border-top: 1px solid var(--border); margin-bottom: 20px; }
  .btn-admin-show { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; padding: 8px 18px; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .btn-admin-show:hover { border-color: var(--green); color: var(--green); }
  #admin-panel { display: none; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; margin-bottom: 60px; }
  #admin-panel.visible { display: block; animation: slideIn 0.3s ease; }
  #admin-panel h2 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; margin-bottom: 24px; color: var(--green); }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .form-group input { width: 100%; background: var(--black); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; outline: none; }
  .form-group input:focus { border-color: var(--green); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .btn-add { width: 100%; background: var(--green); color: var(--black); border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 8px; transition: background 0.2s; }
  .btn-add:hover { background: var(--green-dark); }
  .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }
  .admin-matches { margin-top: 28px; border-top: 1px solid var(--border); padding-top: 24px; }
  .admin-matches h3 { font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .admin-match-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 12px; }
  .admin-match-info { font-size: 14px; flex: 1; min-width: 0; }
  .admin-match-info strong { display: block; font-weight: 600; }
  .admin-match-info span { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; display: block; }
  .btn-delete { background: none; border: 1px solid #333; color: #666; border-radius: 7px; padding: 6px 12px; font-size: 12px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; font-family: 'DM Sans', sans-serif; }
  .btn-delete:hover { border-color: #e53935; color: #e53935; }
  #auth-form { text-align: center; }
  #auth-form p { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
  #auth-form input { background: var(--black); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; width: 100%; max-width: 300px; margin-bottom: 12px; text-align: center; letter-spacing: 4px; transition: border-color 0.2s; }
  #auth-form input:focus { border-color: var(--green); }
  .btn-auth { background: var(--green); color: var(--black); border: none; border-radius: 10px; padding: 12px 28px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; }
  .btn-auth:hover { background: var(--green-dark); }
  .auth-error { color: #e53935; font-size: 13px; margin-top: 10px; }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--green); color: var(--black); font-weight: 700; font-size: 14px; padding: 12px 24px; border-radius: 10px; z-index: 999; animation: toastIn 0.3s ease, toastOut 0.3s ease 2s both; }
  @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
  @keyframes toastOut { to { opacity:0; transform: translateX(-50%) translateY(10px); } }
  footer { text-align: center; padding: 30px 0 50px; color: #444; font-size: 12px; }
  .btn-join-mobile { display: none; }
  @media (max-width: 520px) {
    .form-row { grid-template-columns: 1fr; }
    .match-cta { display: none; }
    .btn-join-mobile { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--green); color: var(--black); font-weight: 700; font-size: 15px; padding: 14px 20px; margin: 0 16px 16px; border-radius: 10px; text-decoration: none; transition: background 0.2s; }
    .btn-join-mobile:active { background: var(--green-dark); }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-badge">⚽ Chaque lundi soir</div>
    <h1>LUNDI DES<span>CHAMPIONS</span></h1>
    <p class="header-sub">Retrouve tous les matchs à venir, l'heure et le lieu</p>
  </header>

  <div id="loading">
    <div class="spinner"></div>
    <p>Chargement des matchs...</p>
  </div>

  <div id="matches-list" style="display:none"></div>

  <div id="admin-toggle-area">
    <button class="btn-admin-show" onclick="toggleAdminPanel()">⚙ Administration</button>
  </div>

  <div id="admin-panel">
    <div id="auth-form">
      <h2>🔒 ACCÈS ADMIN</h2>
      <p>Entrez le mot de passe pour gérer les matchs</p>
      <input type="password" id="pwd-input" placeholder="••••••" onkeydown="if(event.key==='Enter')checkAuth()">
      <br>
      <button class="btn-auth" onclick="checkAuth()">Accéder</button>
      <p class="auth-error" id="auth-error"></p>
    </div>

    <div id="admin-form" style="display:none">
      <h2>➕ AJOUTER UN MATCH</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="inp-date">
        </div>
        <div class="form-group">
          <label>Heure</label>
          <input type="time" id="inp-time" value="20:00">
        </div>
      </div>
      <div class="form-group">
        <label>Lieu / Terrain</label>
        <input type="text" id="inp-location" placeholder="ex: LeFive Paris 11e">
      </div>
      <div class="form-group">
        <label>Lien LeFive</label>
        <input type="url" id="inp-link" placeholder="https://lefive.fr/...">
      </div>
      <div class="form-group">
        <label>N° Réservation LeFive (pour le compteur)</label>
        <input type="text" id="inp-resaid" placeholder="ex: 9544177">
      </div>
      <button class="btn-add" id="btn-add" onclick="addMatch()">Ajouter ce match</button>

      <div class="admin-matches">
        <h3>Matchs enregistrés</h3>
        <div id="admin-match-list"></div>
      </div>

      <div style="margin-top:20px;text-align:right">
        <button class="btn-admin-show" onclick="logout()">Déconnexion</button>
      </div>
    </div>
  </div>

  <footer>Fait avec ❤️ pour les Warriors du Lundi</footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhuxG_tpZTVeb3QF1jtG-5Ho1qHbPXaBw",
    authDomain: "matchs-foot.firebaseapp.com",
    databaseURL: "https://matchs-foot-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "matchs-foot",
    storageBucket: "matchs-foot.firebasestorage.app",
    messagingSenderId: "616668760897",
    appId: "1:616668760897:web:bab5448661ee0ae68b6fc0",
    measurementId: "G-5Y9EGHNELD"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const matchsRef = ref(db, 'matchs');

  const ADMIN_PASSWORD = 'lundi2024';
  let isAuth = false;
  let allMatches = {};

  // Écoute les données en temps réel
  onValue(matchsRef, (snapshot) => {
    allMatches = snapshot.val() || {};
    document.getElementById('loading').style.display = 'none';
    document.getElementById('matches-list').style.display = 'flex';
    renderMatches();
    if (isAuth) renderAdminList();
  });

  function renderMatches() {
    const container = document.getElementById('matches-list');
    const entries = Object.entries(allMatches);

    if (entries.length === 0) {
      container.innerHTML = `<div class="empty-state">
        <span class="empty-icon">⚽</span>
        <p>Aucun match prévu pour le moment.</p>
        <p style="margin-top:8px;font-size:13px;">Reviens bientôt !</p>
      </div>`;
      return;
    }

    const sorted = entries
      .map(([id, m]) => ({ id, ...m }))
      .sort((a, b) => new Date(a.date + 'T' + (a.time || '00:00')) - new Date(b.date + 'T' + (b.time || '00:00')));

    const now = new Date();

    container.innerHTML = sorted.map((m, i) => {
      const dt = new Date(m.date + 'T' + (m.time || '00:00'));
      const isPast = dt < now;
      const day = dt.getDate();
      const month = dt.toLocaleDateString('fr-FR', { month: 'short' }).replace('.', '').toUpperCase();
      const weekday = dt.toLocaleDateString('fr-FR', { weekday: 'long' });
      const timeStr = m.time ? m.time.substring(0, 5) : '';

      return `
      <div class="match-card ${isPast ? 'past' : ''}" style="animation-delay:${i * 0.07}s">
        <div class="match-inner">
          <div class="match-date-block">
            <div class="match-day">${day}</div>
            <div class="match-month">${month}</div>
          </div>
          <div class="match-info">
            <div class="match-weekday">${weekday}${isPast ? '<span class="past-badge">Passé</span>' : ''}</div>
            <div class="match-title">Match du lundi</div>
            <div class="match-details">
              ${timeStr ? `<span class="match-detail">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${timeStr}
              </span>` : ''}
              ${m.location ? `<span class="match-detail">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                ${m.location}
              </span>` : ''}
              ${m.resaId && !isPast ? `<span class="players-badge loading" id="badge-${m.id}">👥 chargement...</span>` : ''}
            </div>
          </div>
          ${m.link && !isPast ? `<div class="match-cta">
            <a href="${m.link}" target="_blank" rel="noopener" class="btn-join">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              Rejoindre
            </a>
          </div>` : ''}
        </div>
        ${m.link && !isPast ? `<a href="${m.link}" target="_blank" rel="noopener" class="btn-join-mobile">⚽ Rejoindre sur LeFive</a>` : ''}
      </div>`;
    }).join('');

    // Charger le compteur de joueurs pour chaque match avec resaId
    const now2 = new Date();
    sorted.forEach(m => {
      if (m.resaId && !isPast) {
        const dt2 = new Date(m.date + 'T' + (m.time || '00:00'));
        if (dt2 >= now2) fetchPlayerCount(m.id, m.resaId);
      }
    });
  }

  async function fetchPlayerCount(matchId, resaId) {
    const badge = document.getElementById('badge-' + matchId);
    if (!badge) return;
    try {
      const res = await fetch('/.netlify/functions/lefive?reservationId=' + resaId);
      const data = await res.json();
      if (data.ok) {
        const isFull = data.inscrits >= data.total;
        badge.className = 'players-badge' + (isFull ? ' full' : '');
        badge.textContent = '👥 ' + data.affichage + ' joueurs';
      } else {
        badge.style.display = 'none';
      }
    } catch(e) {
      badge.style.display = 'none';
    }
  }

  window.toggleAdminPanel = function() {
    document.getElementById('admin-panel').classList.toggle('visible');
  };

  window.checkAuth = function() {
    const val = document.getElementById('pwd-input').value;
    if (val === ADMIN_PASSWORD) {
      isAuth = true;
      document.getElementById('auth-form').style.display = 'none';
      document.getElementById('admin-form').style.display = 'block';
      renderAdminList();
    } else {
      document.getElementById('auth-error').textContent = 'Mot de passe incorrect.';
    }
  };

  window.logout = function() {
    isAuth = false;
    document.getElementById('auth-form').style.display = 'block';
    document.getElementById('admin-form').style.display = 'none';
    document.getElementById('pwd-input').value = '';
    document.getElementById('auth-error').textContent = '';
    document.getElementById('admin-panel').classList.remove('visible');
  };

  window.addMatch = async function() {
    const date = document.getElementById('inp-date').value;
    const time = document.getElementById('inp-time').value;
    const location = document.getElementById('inp-location').value.trim();
    const link = document.getElementById('inp-link').value.trim();
    const resaId = document.getElementById('inp-resaid').value.trim();

    if (!date) { alert('Veuillez saisir une date.'); return; }

    const btn = document.getElementById('btn-add');
    btn.disabled = true;
    btn.textContent = 'Enregistrement...';

    await push(matchsRef, { date, time, location, link, resaId });

    document.getElementById('inp-date').value = '';
    document.getElementById('inp-time').value = '20:00';
    document.getElementById('inp-location').value = '';
    document.getElementById('inp-link').value = '';
    document.getElementById('inp-resaid').value = '';

    btn.disabled = false;
    btn.textContent = 'Ajouter ce match';
    showToast('✅ Match ajouté !');
  };

  window.deleteMatch = async function(id) {
    if (!confirm('Supprimer ce match ?')) return;
    await remove(ref(db, 'matchs/' + id));
    showToast('🗑 Match supprimé');
  };

  function renderAdminList() {
    const container = document.getElementById('admin-match-list');
    const entries = Object.entries(allMatches);

    if (entries.length === 0) {
      container.innerHTML = '<p style="color:var(--muted);font-size:14px;">Aucun match enregistré.</p>';
      return;
    }

    const sorted = entries
      .map(([id, m]) => ({ id, ...m }))
      .sort((a, b) => new Date(a.date) - new Date(b.date));

    container.innerHTML = sorted.map(m => {
      const dt = new Date(m.date + 'T00:00:00');
      const label = dt.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'long' });
      return `<div class="admin-match-row">
        <div class="admin-match-info">
          <strong>${label}${m.time ? ' · ' + m.time.substring(0,5) : ''}</strong>
          <span>${m.location || ''}${m.link ? (m.location ? ' · ' : '') + m.link : ''}</span>
        </div>
        <button class="btn-delete" onclick="deleteMatch('${m.id}')">Supprimer</button>
      </div>`;
    }).join('');
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }
</script>
</body>
</html>
